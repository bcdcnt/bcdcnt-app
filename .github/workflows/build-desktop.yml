name: Build desktop + Android (Windows / macOS / Linux / Android)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# GitHub is forcing Node.js 24 for JavaScript actions starting June 2nd
# 2026; opting in early so the runner doesn't fall back to the
# soon-to-be-removed Node 20. Action versions below are pinned to
# releases that natively bundle Node 24, so this env is also a belt-
# and-braces guard against any transitive action still on Node 20.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos
          - os: ubuntu-latest
            target: linux
          - os: ubuntu-latest
            target: android
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      # JDK 17 for the Android Gradle build. Flutter complains on older JDKs
      # and the runner's default is too low. Desktop targets skip this — they
      # don't compile Java.
      - name: Set up JDK 17
        if: matrix.target == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Linux toolchain — GitHub's ubuntu image doesn't ship GTK headers by
      # default and Flutter desktop won't link without them.
      - name: Install Linux build deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libayatana-appindicator3-dev

      # `flutter config --enable-<target>-desktop` is desktop-only; running
      # it for Android errors out because there's no such flag.
      - name: Enable ${{ matrix.target }} desktop
        if: matrix.target != 'android'
        run: flutter config --enable-${{ matrix.target }}-desktop

      # The repo only carries android/, ios/, macos/ — generate the missing
      # platform scaffold on the fly so the build picks up the standard
      # CMake/Win32 entry points without polluting the repo with auto-gen
      # files for platforms we don't develop on locally. Android already
      # has its folder committed and doesn't need scaffolding.
      - name: Scaffold ${{ matrix.target }} platform
        if: matrix.target != 'android'
        run: flutter create --platforms=${{ matrix.target }} .

      # Decode the release keystore from the base64 secret and stash the
      # path + credentials in env vars that android/app/build.gradle.kts
      # picks up via System.getenv. Local builds without these env vars
      # fall back to the debug keystore so contributors can still smoke-
      # test release builds.
      - name: Decode Android keystore
        if: matrix.target == 'android'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "${RUNNER_TEMP}/bcdcnt-release.jks"
          echo "ANDROID_KEYSTORE_PATH=${RUNNER_TEMP}/bcdcnt-release.jks" >> "$GITHUB_ENV"

      # flutter create drops a Flutter-branded default app_icon.ico into
      # windows/runner/resources/ which is then compiled into the .exe
      # title-bar icon. Replace it with a multi-resolution ICO generated
      # from the existing macOS 1024px asset so the Windows window shows
      # the BCĐCNT logo instead of the Flutter chevron. ImageMagick
      # ships pre-installed on GitHub's Windows runners.
      - name: Replace Windows app icon
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          magick "macos/Runner/Assets.xcassets/AppIcon.appiconset/app_icon_1024.png" `
            -define icon:auto-resize=256,128,64,48,32,16 `
            "windows/runner/resources/app_icon.ico"

      - name: Pub get
        run: flutter pub get

      # --tree-shake-icons strips unused glyphs from icon fonts (Material/
      # Cupertino) — saves a few MB on top of the default release build.
      # --obfuscate + --split-debug-info renames Dart symbols to short
      # opaque names and writes the original mapping to a separate folder
      # that we don't ship; shaves additional MBs and lightly protects
      # the source. Mapping symbols are kept as a build artifact so prod
      # crash reports remain decodable if we wire up Sentry later.
      # Android target needs `flutter build apk` not `flutter build android`;
      # everything else is the desktop target name unchanged.
      - name: Build
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ "${{ matrix.target }}" = "android" ]; then
            flutter build apk --release --tree-shake-icons --obfuscate --split-debug-info=build/symbols
          else
            flutter build ${{ matrix.target }} --release --tree-shake-icons --obfuscate --split-debug-info=build/symbols
          fi
        shell: bash

      # macOS still produces bcdcnt_flutter.app because macos/Runner.xcodeproj
      # was generated before pubspec was renamed and we kept the existing
      # folder intact. Rename post-build so the artifact users see matches
      # Windows/Linux. Editing the Xcode project file directly is risky.
      - name: Rename macOS .app
        if: matrix.target == 'macos'
        run: |
          cd build/macos/Build/Products/Release
          if [ -d bcdcnt_flutter.app ]; then
            mv bcdcnt_flutter.app bcdcnt.app
          fi

      # Upload only the runnable artifact, not the full Build/Products/
      # folder. macOS in particular dragged 200+ MB of .dSYM debug
      # symbols up to the artifact previously — the user only needs the
      # .app bundle to test.
      - name: Upload Windows artifact
        if: matrix.target == 'windows'
        uses: actions/upload-artifact@v5
        with:
          name: bcdcnt-windows
          path: build/windows/x64/runner/Release/
          if-no-files-found: error

      - name: Upload macOS artifact
        if: matrix.target == 'macos'
        uses: actions/upload-artifact@v5
        with:
          name: bcdcnt-macos
          path: build/macos/Build/Products/Release/bcdcnt.app
          if-no-files-found: error

      - name: Upload Linux artifact
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v5
        with:
          name: bcdcnt-linux
          path: build/linux/x64/release/bundle/
          if-no-files-found: error

      # Flutter writes the APK as app-release.apk; rename to
      # bcdcnt-android.apk so the file users download / install
      # matches the brand and the asset-name pattern that
      # update_check.dart greps for ("bcdcnt-<platform>").
      - name: Rename Android APK
        if: matrix.target == 'android'
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/bcdcnt-android.apk

      - name: Upload Android artifact
        if: matrix.target == 'android'
        uses: actions/upload-artifact@v5
        with:
          name: bcdcnt-android
          path: build/app/outputs/flutter-apk/bcdcnt-android.apk
          if-no-files-found: error

      # When this workflow runs from a tag push, also package each
      # platform's bundle into a single .zip and attach it to a
      # GitHub Release. The Flutter app's in-app update checker hits
      # the Releases API for `tag_name` + asset URLs, so this is what
      # actually surfaces a new version to running clients.
      #
      # Two steps because Windows runners don't ship the `zip` CLI in
      # Git Bash (line 13 of the prior single step failed with "zip:
      # command not found"); use PowerShell's Compress-Archive on
      # Windows and bash zip everywhere else.
      - name: Package release zip (Linux / macOS)
        if: startsWith(github.ref, 'refs/tags/v') && matrix.target != 'windows' && matrix.target != 'android'
        shell: bash
        run: |
          set -e
          case "${{ matrix.target }}" in
            macos)   src="build/macos/Build/Products/Release/bcdcnt.app" ;;
            linux)   src="build/linux/x64/release/bundle" ;;
          esac
          mkdir -p release-zip
          if [ "${{ matrix.target }}" = "macos" ]; then
            # Keep .app as the top-level dir inside the zip so users get
            # the familiar drag-to-Applications bundle on extract.
            (cd "$(dirname "$src")" && zip -qry "${GITHUB_WORKSPACE}/release-zip/bcdcnt-${{ matrix.target }}.zip" "$(basename "$src")")
          else
            (cd "$src" && zip -qry "${GITHUB_WORKSPACE}/release-zip/bcdcnt-${{ matrix.target }}.zip" .)
          fi
          ls -lh release-zip

      - name: Package release zip (Windows)
        if: startsWith(github.ref, 'refs/tags/v') && matrix.target == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-zip | Out-Null
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath release-zip/bcdcnt-windows.zip `
            -Force
          Get-ChildItem release-zip

      # Two attach steps — desktop uploads the zipped bundle, Android
      # uploads the .apk directly (no zip wrapper; users expect to
      # tap-install the apk file straight from the download).
      - name: Attach desktop zip to Release
        if: startsWith(github.ref, 'refs/tags/v') && matrix.target != 'android'
        uses: softprops/action-gh-release@v2
        with:
          files: release-zip/bcdcnt-${{ matrix.target }}.zip
          # generate_release_notes asks GitHub to summarise commits since
          # the previous tag — saves us writing release notes by hand
          # while still giving the in-app banner something to surface.
          generate_release_notes: true

      - name: Attach Android APK to Release
        if: startsWith(github.ref, 'refs/tags/v') && matrix.target == 'android'
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/bcdcnt-android.apk
          generate_release_notes: true
