name: Build desktop (Windows / macOS / Linux)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
            artifact_path: build/windows/x64/runner/Release/
          - os: macos-latest
            target: macos
            artifact_path: build/macos/Build/Products/Release/
          - os: ubuntu-latest
            target: linux
            artifact_path: build/linux/x64/release/bundle/
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Linux toolchain — GitHub's ubuntu image doesn't ship GTK headers by
      # default and Flutter desktop won't link without them.
      - name: Install Linux build deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libayatana-appindicator3-dev

      - name: Enable ${{ matrix.target }} desktop
        run: flutter config --enable-${{ matrix.target }}-desktop

      # The repo only carries android/, ios/, macos/ — generate the missing
      # platform scaffold on the fly so the build picks up the standard
      # CMake/Win32 entry points without polluting the repo with auto-gen
      # files for platforms we don't develop on locally.
      - name: Scaffold ${{ matrix.target }} platform
        run: flutter create --platforms=${{ matrix.target }} .

      - name: Pub get
        run: flutter pub get

      - name: Build
        run: flutter build ${{ matrix.target }} --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bcdcnt-${{ matrix.target }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
