workflows:
  ios-testflight:
    name: iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic-bcdcnt
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: net.bcdcnt.bcdcntFlutter
      vars:
        APP_STORE_APPLE_ID: 0  # TODO: lấy Apple ID của app trên App Store Connect (số)
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Set build number
        script: |
          BUILD_NUMBER=$(($(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID") + 1))
          echo "Setting build number to $BUILD_NUMBER"
          flutter build ipa --release --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers   # Tạo group này trong App Store Connect → TestFlight → Internal Testing
