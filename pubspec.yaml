name: bcdcnt
description: BCĐCNT - Bài Ca Đi Cùng Năm Tháng
publish_to: 'none'
version: 1.0.3+4

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  provider: ^6.1.2
  go_router: ^14.6.0
  shared_preferences: ^2.3.0
  cached_network_image: ^3.4.0
  just_audio: ^0.9.40
  # just_audio only ships native backends for iOS/Android/macOS/Web.
  # Windows & Linux desktop need a libmpv-backed implementation or
  # audio playback silently fails (duration stays at 0:00). Pulled
  # behind a `Platform.is*` guard in main.dart so mobile builds skip
  # the libmpv bindings entirely.
  just_audio_media_kit: ^2.0.6
  media_kit_libs_audio: ^1.0.5
  url_launcher: ^6.3.0
  flutter_html: ^3.0.0-beta.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  video_player: ^2.9.2
  chewie: ^1.8.5
  file_picker: ^8.1.4
  palette_generator: ^0.3.3+7
  web_socket_channel: ^3.0.0
  window_manager: ^0.4.3
  pasteboard: ^0.5.0
  flutter_quill: ^11.5.0
  flutter_quill_extensions: ^11.0.0
  vsc_quill_delta_to_html: ^1.0.5
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
